<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Transparent background (no dark square) -->
  <!-- 8 teeth (behind gear body) -->
  <rect x="92" y="26" width="16" height="16" fill="#a07840" rx="2"/>
  <rect x="92" y="158" width="16" height="16" fill="#a07840" rx="2"/>
  <rect x="26" y="92" width="16" height="16" fill="#a07840" rx="2"/>
  <rect x="158" y="92" width="16" height="16" fill="#a07840" rx="2"/>
  <rect x="139" y="45" width="16" height="16" fill="#a07840" rx="2" transform="rotate(45 147 53)"/>
  <rect x="45" y="45" width="16" height="16" fill="#a07840" rx="2" transform="rotate(45 53 53)"/>
  <rect x="139" y="139" width="16" height="16" fill="#a07840" rx="2" transform="rotate(45 147 147)"/>
  <rect x="45" y="139" width="16" height="16" fill="#a07840" rx="2" transform="rotate(45 53 147)"/>
  <!-- Outer gear body (on top of teeth) -->
  <circle cx="100" cy="100" r="65" fill="#a07840"/>
  <circle cx="100" cy="100" r="54" fill="#6d5230"/>
  <!-- Inner hole (transparent) -->
  <circle cx="100" cy="100" r="40" fill="none"/>
  <!-- Diamond (4 faces for 3D) -->
  <polygon points="100,60 125,100 100,140 75,100" fill="#00d4aa"/>
  <polygon points="100,60 125,100 100,100" fill="#00eebb"/>
  <polygon points="100,100 125,100 100,140" fill="#008b6b"/>
  <polygon points="100,60 75,100 100,100" fill="#00b894"/>
  <polygon points="100,100 75,100 100,140" fill="#007755"/>
  <!-- Gold border on diamond -->
  <polygon points="100,60 125,100 100,140 75,100" fill="none" stroke="#c8a84b" stroke-width="4"/>
  <!-- Gem highlight -->
  <polygon points="100,66 108,80 100,86 92,80" fill="#4dffd4" opacity="0.4"/>
</svg>
